<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Voox — Controle Financeiro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g50:#E6EDE9;--g100:#C4D4CD;--g200:#97B3A5;--g400:#58856F;--g600:#2E664B;--g800:#1E4231;--g900:#152E22;
  --n50:#F7F7F5;--n100:#EFEFEB;--n200:#D8D8D2;--n400:#9B9B94;--n600:#5F5E5A;--n800:#2C2C2A;--n900:#1A1A18;
  --danger:#DC2626;--warn:#D97706;--rmd:8px;--rlg:12px;--rxl:16px;
}
body{font-family:'DM Sans',sans-serif;background:var(--n50);color:var(--n900);min-height:100vh;font-size:15px;line-height:1.6}

#login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--n50);z-index:1000;padding:16px}
.lb1{position:absolute;width:400px;height:400px;background:var(--g50);border-radius:50%;top:-120px;right:-120px;opacity:.7}
.lb2{position:absolute;width:260px;height:260px;background:var(--g100);border-radius:50%;bottom:-80px;left:-80px;opacity:.5}
.lcard{position:relative;z-index:1;background:#fff;border:1px solid var(--n200);border-radius:var(--rxl);padding:36px 28px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(46,102,75,.08);animation:slideUp .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.llogo{margin-bottom:4px}.llogo img{height:52px;display:block}
.lsub{font-size:13px;color:var(--n400);margin-bottom:28px}
.llabel{display:block;font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--n600);margin-bottom:8px}
.ldots{display:flex;gap:8px;margin-bottom:24px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--n200);transition:background .2s,transform .2s}
.dot.filled{background:var(--g600);transform:scale(1.15)}
.liwrap{position:relative;margin-bottom:16px}
.linput{width:100%;background:var(--n50);border:1px solid var(--n200);border-radius:var(--rmd);padding:12px 44px 12px 14px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--n900);outline:none;transition:border-color .15s,box-shadow .15s;letter-spacing:3px}
.linput:focus{border-color:var(--g600);box-shadow:0 0 0 3px rgba(46,102,75,.12)}
.linput::placeholder{letter-spacing:1px;color:var(--n400);font-size:13px}
.linput.error{border-color:var(--danger)}
.eyebtn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--n400);font-size:15px}
.lbtn{width:100%;padding:12px 24px;background:var(--g600);color:#fff;border:none;border-radius:var(--rmd);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.lbtn:active{background:var(--g800)}
.lerr{font-size:13px;color:var(--danger);margin-top:10px;text-align:center;min-height:18px}
.lstatus{font-size:12px;color:var(--g600);margin-top:8px;text-align:center;min-height:18px}

#dashboard{display:none;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:#fff;border-right:1px solid var(--n200);display:flex;flex-direction:column;position:fixed;top:0;bottom:0;left:0;z-index:50;padding:24px 0;overflow-y:auto}
.slogo{padding:0 20px;margin-bottom:4px}.slogo img{height:36px;display:block}
.stagline{font-size:11px;color:var(--n400);padding:0 20px;margin-bottom:20px}
.snlabel{font-size:10px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--n400);padding:0 20px;margin-bottom:4px;margin-top:8px}
.mbtn{display:block;width:100%;padding:9px 20px;background:none;border:none;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--n600);transition:all .1s;position:relative;-webkit-tap-highlight-color:transparent}
.mbtn:hover{color:var(--n900);background:var(--n50)}
.mbtn.active{color:var(--g800);font-weight:500;background:var(--g50)}
.mbtn.active::before{content:'';position:absolute;left:0;top:4px;bottom:4px;width:3px;background:var(--g600);border-radius:0 2px 2px 0}
.sfooter{margin-top:auto;padding:16px 20px 0;border-top:1px solid var(--n100)}
.logoutbtn{font-size:13px;color:var(--n400);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .15s;padding:0;-webkit-tap-highlight-color:transparent}
.logoutbtn:hover{color:var(--danger)}
.main{margin-left:220px;padding:32px}

.topbar{display:none;position:fixed;top:0;left:0;right:0;background:#fff;border-bottom:1px solid var(--n200);padding:12px 16px;align-items:center;justify-content:space-between;z-index:200}
.tblogo img{height:28px}
.tbmenu{background:none;border:none;cursor:pointer;font-size:22px;color:var(--n600);padding:4px;-webkit-tap-highlight-color:transparent}
.doverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300}
.doverlay.open{display:block}
.drawer{position:fixed;top:0;bottom:0;left:-240px;width:240px;background:#fff;z-index:400;display:flex;flex-direction:column;padding:24px 0;transition:left .25s ease;overflow-y:auto}
.drawer.open{left:0}
.dlogo{padding:0 20px;margin-bottom:4px}.dlogo img{height:36px;display:block}
.dtagline{font-size:11px;color:var(--n400);padding:0 20px;margin-bottom:20px}
.dclose{position:absolute;top:16px;right:16px;background:none;border:none;cursor:pointer;font-size:20px;color:var(--n400);-webkit-tap-highlight-color:transparent}
.dfooter{margin-top:auto;padding:16px 20px 0;border-top:1px solid var(--n100)}

.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:20px;margin-left:8px;vertical-align:middle}
.sync-ok{background:var(--g50);color:var(--g800)}
.sync-err{background:#FEF2F2;color:#991B1B}
.sync-loading{background:var(--n100);color:var(--n600)}

.ptitle{font-size:28px;font-weight:500;letter-spacing:-1px;color:var(--n900);line-height:1.1;margin-bottom:4px}
.ptitle span{color:var(--n400);font-weight:300}
.phint{font-size:12px;color:var(--n400);margin-bottom:24px}

.sumrow{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.scard{background:#fff;border:1px solid var(--n200);border-radius:var(--rlg);padding:16px;position:relative;overflow:hidden}
.sacc{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--rlg) var(--rlg) 0 0}
.ag{background:var(--g600)}.ad{background:var(--danger)}.aw{background:var(--warn)}
.slabel{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--n400);margin-bottom:6px}
.sval{font-size:18px;font-weight:500;letter-spacing:-.5px;margin-bottom:6px;word-break:break-all}
.vg{color:var(--g600)}.vd{color:var(--danger)}.vw{color:var(--warn)}
.sbadge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px}
.bg{background:var(--g50);color:var(--g800)}.bd{background:#FEF2F2;color:#991B1B}.bw{background:#FFFBEB;color:#92400E}

.saldo{background:var(--g600);border-radius:var(--rlg);padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.sl-label{font-size:11px;color:var(--g200);margin-bottom:4px}
.sl-val{font-size:32px;font-weight:500;letter-spacing:-1.5px;color:#fff;word-break:break-all}
.sl-val.neg{color:#fca5a5}
.sl-formula{font-size:11px;color:var(--g200)}

.section{background:#fff;border:1px solid var(--n200);border-radius:var(--rlg);overflow:hidden;margin-bottom:16px}
.sechdr{padding:16px 20px;border-bottom:1px solid var(--n100);display:flex;align-items:center;justify-content:space-between;gap:8px}
.sectitle{font-size:14px;font-weight:500;color:var(--n900);display:flex;align-items:center;gap:8px}
.secico{width:26px;height:26px;border-radius:var(--rmd);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.ig{background:var(--g50)}.ir{background:#FEF2F2}.ia{background:#FFFBEB}
.sectot{font-size:14px;font-weight:500;white-space:nowrap}
.etable{width:100%;border-collapse:collapse}
.etable th{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--n400);padding:10px 20px;text-align:left;background:var(--n50);border-bottom:1px solid var(--n100)}
.etable th:last-child,.etable td.ar{text-align:right}
.etable td{padding:11px 20px;font-size:13px;border-bottom:1px solid var(--n100);color:var(--n800)}
.etable tr:last-child td{border-bottom:none}
.etable tfoot td{padding:12px 20px;font-size:13px}
.editable{cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;padding:3px 6px;border-radius:4px;transition:background .15s}
.editable:hover{background:var(--g50)}
.delbtn{background:none;border:none;cursor:pointer;font-size:12px;color:var(--n400);padding:3px 6px;border-radius:4px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.delbtn:hover{color:var(--danger);background:#FEF2F2}
.addrow{display:flex;align-items:center;gap:8px;padding:10px 20px;background:var(--n50);border-top:1px solid var(--n100);flex-wrap:wrap}
.ainp{background:#fff;border:1px solid var(--n200);border-radius:var(--rmd);padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--n900);outline:none;transition:border-color .15s;min-width:0}
.ainp:focus{border-color:var(--g600)}
.ainp.wide{flex:1;min-width:120px}.ainp.num{width:110px}.ainp.dt{width:130px}
.ainp::placeholder{color:var(--n400)}
.addbtn{padding:8px 14px;background:var(--g50);border:1px solid var(--g100);border-radius:var(--rmd);color:var(--g800);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.addbtn:active{background:var(--g100)}

.owner-select{font-size:11px;padding:3px 6px;border:1px solid var(--n200);border-radius:4px;background:#fff;color:var(--n800);cursor:pointer;font-family:'DM Sans',sans-serif;outline:none}
.owner-davi{background:#FFF7ED;border-color:#FED7AA;color:#C2410C}
.owner-cleber{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}
.owner-none{background:#fff;color:var(--n600)}
.pago-sim{background:#F0FDF4;border-color:#BBF7D0;color:#15803D}
.pago-nao{background:#FEF2F2;border-color:#FECACA;color:#991B1B}
.pago-none{background:#fff;color:var(--n600)}
.orig-reimb{background:#F5F3FF;border-color:#DDD6FE;color:#6D28D9}
.orig-infinitepay{background:#F5F3FF;border-color:#DDD6FE;color:#7C3AED}
.orig-itau{background:#FFF7ED;border-color:#FED7AA;color:#C2410C}
.orig-dinheiro{background:#F0FDF4;border-color:#BBF7D0;color:#15803D}
.orig-badge{font-size:10px;border-radius:4px;padding:2px 6px;margin-left:4px;display:inline-block}

.invest-summary{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.invest-owner-card{flex:1;min-width:140px;background:#fff;border:1px solid var(--n200);border-radius:var(--rlg);padding:16px;position:relative;overflow:hidden}
.invest-owner-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--rlg) var(--rlg) 0 0}
.ioc-davi::before{background:#F97316}
.ioc-cleber::before{background:#3B82F6}
.ioc-total::before{background:var(--warn)}
.ioc-purple::before{background:#7C3AED}
.ioc-cyan::before{background:#0891B2}

.growth-input{width:100%;background:var(--n50);border:1px solid var(--n200);border-radius:var(--rmd);padding:10px 14px;font-family:'DM Sans',sans-serif;font-size:15px;color:var(--n900);outline:none;transition:border-color .15s}
.growth-input:focus{border-color:#0891B2;box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.growth-save-btn{padding:10px 20px;background:#0891B2;color:#fff;border:none;border-radius:var(--rmd);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.growth-bar-wrap{background:var(--n100);border-radius:20px;height:10px;overflow:hidden;margin-top:8px}
.growth-bar{height:100%;border-radius:20px;transition:width .5s ease}
.growth-card{background:#fff;border:1px solid var(--n200);border-radius:var(--rlg);padding:20px;margin-bottom:12px}

.val-card{background:#fff;border:1px solid var(--n200);border-radius:var(--rlg);padding:20px 24px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.val-card-geral{background:var(--g600);border-color:var(--g800)}
.val-card-left{display:flex;align-items:center;gap:12px}
.val-card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.val-card-name{font-size:14px;font-weight:500;color:var(--n900)}
.val-card-name-geral{color:#fff}
.val-card-sub{font-size:11px;color:var(--n400);margin-top:2px}
.val-card-sub-geral{color:var(--g200)}
.val-inp{background:var(--n50);border:1px solid var(--n200);border-radius:var(--rmd);padding:10px 14px;font-family:'DM Mono',monospace;font-size:15px;color:var(--n900);outline:none;width:180px;text-align:right}
.val-inp:focus{border-color:var(--g600);box-shadow:0 0 0 3px rgba(46,102,75,.1)}
.val-inp-geral{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.2);color:#fff;cursor:default}
.val-save-btn{padding:10px 20px;background:var(--g600);color:#fff;border:none;border-radius:var(--rmd);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.val-save-btn:active{background:var(--g800)}

.month-section{background:#fff;border:1px solid var(--n200);border-radius:var(--rlg);overflow:hidden;margin-bottom:12px}
.month-section-hdr{padding:14px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;-webkit-user-select:none;gap:8px}
.month-section-hdr:hover{background:var(--n50)}
.month-section-arrow{font-size:16px;color:var(--n400);transition:transform .2s;display:inline-block}
.month-section-arrow.open{transform:rotate(180deg)}

input[type='date'].ainp{color:var(--n900);font-family:'DM Sans',sans-serif}
.date-cell{color:var(--n400);font-size:11px;white-space:nowrap}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeIn .3s ease both}
.a1{animation-delay:.05s}.a2{animation-delay:.1s}.a3{animation-delay:.15s}.a4{animation-delay:.2s}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--n200);border-radius:2px}

@media(max-width:700px){
  .sidebar{display:none}
  .topbar{display:flex}
  .main{margin-left:0;padding:76px 16px 24px}
  .sumrow{grid-template-columns:1fr;gap:10px}
  .sval{font-size:22px}
  .saldo{flex-direction:column;align-items:flex-start;padding:16px 18px}
  .sl-val{font-size:26px}
  .ptitle{font-size:22px}
  .etable th,.etable td{padding:9px 12px}
  .addrow{flex-direction:column;align-items:stretch}
  .ainp.wide,.ainp.num,.ainp.dt{width:100%}
  .addbtn{width:100%;text-align:center;padding:10px}
  .sechdr{padding:14px 16px}
  .val-card{flex-direction:column;align-items:flex-start}
  .val-inp{width:100%}
}
/* Modal de edição */
#edit-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.45);align-items:center;justify-content:center}
#edit-modal.open{display:flex}
#edit-modal-box{background:#fff;border-radius:var(--rxl);padding:24px;width:90%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
#edit-modal-box h3{font-size:15px;font-weight:600;margin-bottom:18px;color:var(--n800)}
.edit-field{margin-bottom:14px}
.edit-field label{display:block;font-size:12px;color:var(--n400);margin-bottom:4px;font-weight:500}
.edit-field input,.edit-field select{width:100%;padding:9px 12px;border:1px solid var(--n200);border-radius:var(--rmd);font-size:14px;font-family:inherit;color:var(--n800);background:#fff}
.edit-field input:focus,.edit-field select:focus{outline:none;border-color:var(--g400)}
.edit-modal-btns{display:flex;gap:10px;margin-top:20px}
.edit-save-btn{flex:1;background:var(--g600);color:#fff;border:none;border-radius:var(--rmd);padding:10px;font-size:14px;font-weight:500;cursor:pointer}
.edit-save-btn:hover{background:var(--g800)}
.edit-cancel-btn{flex:1;background:var(--n100);color:var(--n600);border:none;border-radius:var(--rmd);padding:10px;font-size:14px;cursor:pointer}
.editpenbtn{background:none;border:none;cursor:pointer;font-size:13px;color:var(--n400);padding:3px 6px;border-radius:4px;transition:all .15s}
.editpenbtn:hover{color:var(--g600);background:var(--g50)}
</style>
</head>
<body>

<!-- Modal de edição -->
<div id="edit-modal">
  <div id="edit-modal-box">
    <h3>&#9998; Editar lançamento</h3>
    <div class="edit-field"><label>Nome / Descrição</label><input type="text" id="em-name"></div>
    <div class="edit-field"><label>Data</label><input type="date" id="em-date"></div>
    <div class="edit-field"><label>Valor (R$)</label><input type="number" id="em-value" min="0" step="0.01"></div>
    <div class="edit-field" id="em-origem-wrap"><label>Origem</label>
      <select id="em-origem">
        <option value="normal">— Sem origem</option>
        <option value="infinitepay">InfinitePay</option>
        <option value="itau">Itaú</option>
        <option value="dinheiro">Dinheiro</option>
        <option value="reimb-davi">↺ Reembolso Davi</option>
        <option value="reimb-cleber">↺ Reembolso Cleber</option>
      </select>
    </div>
    <div class="edit-modal-btns">
      <button class="edit-cancel-btn" id="em-cancel">Cancelar</button>
      <button class="edit-save-btn" id="em-save">Salvar</button>
    </div>
  </div>
</div>

const DS = [{name:"Sal\u00e1rios e Pr\u00f3-labore",value:0,date:""},{name:"Aluguel e Condom\u00ednio",value:0,date:""},{name:"Ferramentas e Softwares",value:0,date:""},{name:"Fornecedores / Freelancers",value:0,date:""},{name:"Energia / \u00c1gua / Internet",value:0,date:""},{name:"Impostos e Taxas",value:0,date:""},{name:"Transporte",value:0,date:""}];
const DI = [{name:"Equipamentos e Tecnologia",value:0,date:""},{name:"Treinamentos e Capacita\u00e7\u00e3o",value:0,date:""},{name:"Marketing da Ag\u00eancia",value:0,date:""},{name:"Infraestrutura",value:0,date:""}];

function defData() {
  const d = {};
  MONTHS.forEach(m => { d[m] = { e: JSON.parse(JSON.stringify(DE)), s: JSON.parse(JSON.stringify(DS)), i: JSON.parse(JSON.stringify(DI)) }; });
  d._reimb = []; d._growth = {}; d._valores = {}; d._custos = [];
  return d;
}

function mergeData(loaded) {
  const base = defData();
  MONTHS.forEach(m => { if (loaded[m]) base[m] = loaded[m]; });
  if (loaded._reimb != null) base._reimb = Array.isArray(loaded._reimb) ? loaded._reimb : Object.values(loaded._reimb);
  if (loaded._growth) base._growth = loaded._growth;
  if (loaded._valores) base._valores = loaded._valores;
  if (loaded._custos != null) base._custos = Array.isArray(loaded._custos) ? loaded._custos : Object.values(loaded._custos);
  return base;
}

let data = defData();
let active = MONTHS[new Date().getMonth()];
let saveTimer = null;
let unsub = null;
let reimbOpen = {};

const brl = v => new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v||0);
const fmtDate = d => d ? d.split("-").reverse().join("/") : "\u2014";
const sortByDate = arr => [...arr].map((x,i)=>({...x,_i:i})).sort((a,b)=>{
  if(!a.date&&!b.date) return 0;
  if(!a.date) return 1;
  if(!b.date) return -1;
  return b.date.localeCompare(a.date);
});

function setSyncBadge(state) {
  const el = document.getElementById("syncbadge");
  if (!el) return;
  if (state==="ok") { el.className="sync-badge sync-ok"; el.textContent="\u2713 Sincronizado"; }
  else if (state==="err") { el.className="sync-badge sync-err"; el.textContent="\u2717 Erro"; }
  else { el.className="sync-badge sync-loading"; el.textContent="\u27f3 Salvando..."; }
}

async function saveNow() {
  try {
    setSyncBadge("saving");
    await setDoc(doc(db,"voox","financeiro"), JSON.parse(JSON.stringify(data)));
    setSyncBadge("ok");
    localStorage.setItem("voox_backup", JSON.stringify(data));
  } catch(e) { setSyncBadge("err"); console.error(e); }
}

function scheduleSave() { clearTimeout(saveTimer); setSyncBadge("saving"); saveTimer = setTimeout(saveNow, 1200); }

function startListener() {
  if (unsub) unsub();
  unsub = onSnapshot(doc(db,"voox","financeiro"), snap => {
    if (snap.exists()) { data = mergeData(snap.data()); rerenderActive(); setSyncBadge("ok"); }
  }, err => { setSyncBadge("err"); console.error(err); });
}

function rerenderActive() {
  if (active==="_anual") renderAnual();
  else if (active==="_invest") renderInvest();
  else if (active==="_reimb") renderReimb();
  else if (active==="_growth") renderGrowth();
  else if (active==="_valores") renderValores();
  else if (active==="_custos") renderCustos();
  else render(active);
}

async function doLogin() {
  if (document.getElementById("pwd").value !== PWD) {
    document.getElementById("lerr").textContent = "Senha incorreta.";
    const inp = document.getElementById("pwd"); inp.value=""; inp.classList.add("error");
    ["d1","d2","d3","d4","d5","d6","d7","d8"].forEach(id => document.getElementById(id).classList.remove("filled"));
    return;
  }
  document.getElementById("lstatus").textContent = "Conectando...";
  try {
    const snap = await getDoc(doc(db,"voox","financeiro"));
    if (snap.exists()) data = mergeData(snap.data());
    else await setDoc(doc(db,"voox","financeiro"), JSON.parse(JSON.stringify(data)));
  } catch(e) {
    console.error(e);
    const bk = localStorage.getItem("voox_backup");
    if (bk) { try { data = mergeData(JSON.parse(bk)); } catch(_) {} }
  }
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  buildNav(); rerenderActive(); startListener();
}

function doLogout() {
  if (unsub) { unsub(); unsub=null; }
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("dashboard").style.display = "none";
  document.getElementById("pwd").value = "";
  document.getElementById("lstatus").textContent = "";
  ["d1","d2","d3","d4","d5","d6","d7","d8"].forEach(id => document.getElementById(id).classList.remove("filled"));
  closeDrawer();
}

// NAV
function buildNav() {
  const mkBtn = m => {
    const b = document.createElement("button");
    b.className = "mbtn" + (m===active?" active":"");
    b.dataset.m = m; b.textContent = m;
    b.addEventListener("click", () => selectMonth(m));
    return b;
  };
  ["snav","dnav"].forEach(id => { const el=document.getElementById(id); el.innerHTML=""; MONTHS.forEach(m=>el.appendChild(mkBtn(m))); });
}

function setActive(key) {
  active = key;
  document.querySelectorAll(".mbtn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll("[data-m=\""+key+"\"]").forEach(b => b.classList.add("active"));
  const map = {_anual:["anual-s","anual-d"],_invest:["invest-s","invest-d"],_reimb:["reimb-s","reimb-d"],_growth:["growth-s","growth-d"],_valores:["valores-s","valores-d"],_custos:["custos-s","custos-d"]};
  (map[key]||[]).forEach(id => { const el=document.getElementById(id); if(el) el.classList.add("active"); });
}

function selectMonth(m) { setActive(m); render(m); closeDrawer(); }

document.getElementById("anual-s").addEventListener("click",  ()=>{ setActive("_anual"); renderAnual(); });
document.getElementById("anual-d").addEventListener("click",  ()=>{ setActive("_anual"); renderAnual(); closeDrawer(); });

document.getElementById("valores-s").addEventListener("click",()=>{ setActive("_valores"); renderValores(); });

    "</div>" +
    "<div class=\"anim a3\">" + secHTML(m,"e","&#128176;","Entradas","ig","vg",tE) + "</div>" +
    "<div class=\"anim a4\">" + secHTML(m,"s","&#128228;","Sa\u00eddas","ir","vd",tS) + "</div>" +

function secHTML(m, key, icon, title, ic, vc, total) {
  const sorted = sortByDate(data[m][key]);
  const rows = sorted.map(r => {
    const isReimb = r.reimb === "davi" || r.reimb === "cleber";
    const contaLabel = r.conta==="infinitepay"?"InfinitePay":r.conta==="itau"?"Ita\u00fa":"Dinheiro";
    const contaCls = r.conta==="infinitepay"?"orig-infinitepay":r.conta==="itau"?"orig-itau":"orig-dinheiro";
    const origBadge = isReimb
      ? "<span class=\"orig-badge orig-reimb\">\u21ba Reemb. "+(r.reimb==="davi"?"Davi":"Cleber")+"</span>"
      : r.conta
        ? "<span class=\"orig-badge "+contaCls+"\">"+contaLabel+"</span>"
        : "";
    const valorStyle = isReimb ? "text-decoration:line-through;opacity:0.5;" : "";
    return "<tr>" +
      "<td class=\"date-cell\">" + fmtDate(r.date) + "</td>" +
      "<td>" + r.name + origBadge + "</td>" +
      "<td class=\"ar\"><span style=\"" + valorStyle + "\">" + brl(r.value) + "</span></td>" +
      "<td class=\"ar\" style=\"white-space:nowrap\">" +
        "<button class=\"editpenbtn\" data-edit-m=\"" + m + "\" data-edit-key=\"" + key + "\" data-edit-i=\"" + r._i + "\">&#9998;</button>" +
        "<button class=\"delbtn\" data-m=\"" + m + "\" data-key=\"" + key + "\" data-del=\"" + r._i + "\">&#x2715;</button>" +
      "</td>" +
    "</tr>";
  }).join("");
  const origemSelect = (key === "s" || key === "e")
    ? "<select class=\"owner-select owner-none ainp\" id=\"orig-"+m+"-"+key+"\" style=\"width:auto;padding:8px 10px;\">" +
        "<option value=\"normal\">\u2014 Sem origem</option>" +
        "<option value=\"infinitepay\">InfinitePay</option>" +
        "<option value=\"itau\">Ita\u00fa</option>" +
        "<option value=\"dinheiro\">Dinheiro</option>" +
        (key === "s" ? "<option value=\"reimb-davi\">\u21ba Reembolso Davi</option><option value=\"reimb-cleber\">\u21ba Reembolso Cleber</option>" : "") +
      "</select>"
    : "";
  return "<div class=\"section\">" +
    "<div class=\"sechdr\"><div class=\"sectitle\"><div class=\"secico " + ic + "\">" + icon + "</div>" + title + "</div><div class=\"sectot " + vc + "\">" + brl(total) + "</div></div>" +
    "<table class=\"etable\"><thead><tr><th>Data</th><th>Descri\u00e7\u00e3o</th><th style=\"text-align:right\">Valor</th><th style=\"width:40px\"></th></tr></thead><tbody>" + rows + "</tbody></table>" +
    "<div class=\"addrow\">" +
      "<input class=\"ainp dt\" type=\"date\" id=\"d-" + m + "-" + key + "\">" +
      "<input class=\"ainp wide\" type=\"text\" placeholder=\"Nova descri\u00e7\u00e3o...\" id=\"n-" + m + "-" + key + "\">" +
      "<input class=\"ainp num\" type=\"number\" placeholder=\"R$ 0,00\" id=\"v-" + m + "-" + key + "\" min=\"0\" step=\"0.01\">" +
      origemSelect +
      "<button class=\"addbtn\" data-add-m=\"" + m + "\" data-add-key=\"" + key + "\">+ Adicionar</button>" +
    "</div>" +
  "</div>";
}

// Estado do modal
let _editCtx = null;

function openEditModal(ctx) {
  _editCtx = ctx;
  document.getElementById("em-name").value = ctx.name || "";
  document.getElementById("em-date").value = ctx.date || "";
  document.getElementById("em-value").value = ctx.value || "";
  const origWrap = document.getElementById("em-origem-wrap");
  const origSel = document.getElementById("em-origem");
  const dateWrap = document.getElementById("em-date").parentElement;
  if (ctx.type === "reimb" || ctx.type === "custo") {
    origWrap.style.display = "none";
    dateWrap.style.display = ctx.type === "custo" ? "none" : "";
  } else {
    origWrap.style.display = "";
    // remove opções de reembolso se for entrada
    const reimbOpts = origSel.querySelectorAll("[value^='reimb']");
    reimbOpts.forEach(o => o.style.display = ctx.key === "s" ? "" : "none");
    // define origem atual
    let origVal = "normal";
    if (ctx.item.reimb === "davi") origVal = "reimb-davi";
    else if (ctx.item.reimb === "cleber") origVal = "reimb-cleber";
    else if (ctx.item.conta) origVal = ctx.item.conta;
    origSel.value = origVal;
  }
  document.getElementById("edit-modal").classList.add("open");
}

function closeEditModal() {
  document.getElementById("edit-modal").classList.remove("open");
  _editCtx = null;
}

function saveEditModal() {
  if (!_editCtx) return;
  const name = document.getElementById("em-name").value.trim();
  const date = document.getElementById("em-date").value;
  const val = parseFloat(document.getElementById("em-value").value) || 0;
  if (!name) { document.getElementById("em-name").focus(); return; }

  if (_editCtx.type === "reimb") {
    const idx = _editCtx.idx;
    data._reimb[idx].name = name;
    data._reimb[idx].date = date;
    data._reimb[idx].value = val;
    scheduleSave(); closeEditModal(); renderReimb(); return;
  }
  if (_editCtx.type === "custo") {
    const idx = _editCtx.idx;
    data._custos[idx].name = name;
    data._custos[idx].value = val;
    scheduleSave(); closeEditModal(); renderAnual(); return;
  }

  const {m, key, i} = _editCtx;
  const item = data[m][key][i];
  item.name = name;
  item.date = date;
  item.value = val;

  // atualiza origem
  const orig = document.getElementById("em-origem").value;
  delete item.reimb; delete item.conta;
  if (orig === "reimb-davi" || orig === "reimb-cleber") {
    item.reimb = orig === "reimb-davi" ? "davi" : "cleber";
  } else if (orig !== "normal") {
    item.conta = orig;
  }

  scheduleSave(); closeEditModal(); render(m);
}

// Delegação global de eventos (registrada uma única vez)
(function() {
  document.getElementById("em-cancel").addEventListener("click", closeEditModal);
  document.getElementById("em-save").addEventListener("click", saveEditModal);
  document.getElementById("edit-modal").addEventListener("click", function(e) {
    if (e.target === this) closeEditModal();
  });

  document.addEventListener("click", function(e) {
    // Botão lápis — itens de mês
    const penbtn = e.target.closest("[data-edit-m]");
    if (penbtn) {
      const m = penbtn.dataset.editM, key = penbtn.dataset.editKey, i = parseInt(penbtn.dataset.editI);
      const item = data[m][key][i];
      if (!item) return;
      openEditModal({type:"item", m, key, i, item, name:item.name, date:item.date, value:item.value});
      return;
    }
    // Botão lápis — reembolso
    const rpen = e.target.closest("[data-edit-reimb]");
    if (rpen) {
      const idx = parseInt(rpen.dataset.editReimb);
      const item = data._reimb[idx];
      if (!item) return;
      openEditModal({type:"reimb", idx, item, name:item.name, date:item.date, value:item.value});
      return;
    }
    // Botão lápis — custo fixo
    const cpen = e.target.closest("[data-edit-custo]");
    if (cpen) {
      const idx = parseInt(cpen.dataset.editCusto);
      const item = data._custos[idx];
      if (!item) return;
      openEditModal({type:"custo", idx, item, name:item.name, date:"", value:item.value});
      return;
    }
    // Deletar custo fixo
    const cdel = e.target.closest("[data-del-custo]");
    if (cdel) {
      data._custos.splice(parseInt(cdel.dataset.delCusto), 1);
      scheduleSave(); renderAnual();
      return;
    }
    // Deletar item
    const delbtn = e.target.closest("[data-del]");
    if (delbtn && delbtn.dataset.m) {
      const {m, key} = delbtn.dataset;
      data[m][key].splice(parseInt(delbtn.dataset.del), 1);
      scheduleSave(); render(m);
      return;
    }
    // Deletar reembolso
    const rdbtn = e.target.closest("[data-rd]");
    if (rdbtn) {
      data._reimb.splice(parseInt(rdbtn.dataset.rd), 1);
      scheduleSave(); renderReimb();
      return;
    }
    // Adicionar item
    const addbtn = e.target.closest("[data-add-m]");
    if (addbtn) {
      const m=addbtn.dataset.addM, key=addbtn.dataset.addKey;
      const di=document.getElementById("d-"+m+"-"+key);
      const ni=document.getElementById("n-"+m+"-"+key);
      const vi=document.getElementById("v-"+m+"-"+key);
      const name=ni.value.trim();
      if (!name) { ni.focus(); return; }
      const val=parseFloat(vi.value)||0;
      const date=di.value||"";
      if (key==="s") {
        const origSel=document.getElementById("orig-"+m+"-s");
        const orig=origSel?origSel.value:"normal";
        if (orig==="reimb-davi"||orig==="reimb-cleber") {
          const owner=orig==="reimb-davi"?"Davi":"Cleber";
          data[m][key].push({name,value:val,date,reimb:orig==="reimb-davi"?"davi":"cleber"});
          if(!data._reimb) data._reimb=[];
          data._reimb.push({name,date,value:val,owner,pago:"nao"});
          ni.value=""; vi.value=""; if(origSel){origSel.value="normal";origSel.className="owner-select owner-none ainp";origSel.style.width="auto";origSel.style.padding="8px 10px";}
          scheduleSave(); render(m); return;
        }
        if (orig==="infinitepay"||orig==="itau"||orig==="dinheiro") {
          data[m][key].push({name,value:val,date,conta:orig});
          ni.value=""; vi.value=""; if(origSel){origSel.value="normal";origSel.className="owner-select owner-none ainp";origSel.style.width="auto";origSel.style.padding="8px 10px";}
          scheduleSave(); render(m); return;
        }
      }
      if (key==="e") {
        const origSel=document.getElementById("orig-"+m+"-e");
        const orig=origSel?origSel.value:"normal";
        if (orig==="infinitepay"||orig==="itau"||orig==="dinheiro") {
          data[m][key].push({name,value:val,date,conta:orig});
          ni.value=""; vi.value=""; if(origSel){origSel.value="normal";origSel.className="owner-select owner-none ainp";origSel.style.width="auto";origSel.style.padding="8px 10px";}
          scheduleSave(); render(m); return;
        }
      }
      data[m][key].push({name,value:val,date});
      ni.value=""; vi.value="";
      scheduleSave(); render(m);
      return;
    }
  });

  // Select de origem — mudança de cor
  document.addEventListener("change", function(e) {
    const sel = e.target.closest("[id^='orig-']");
    if (!sel) return;
    const v=sel.value;
    let cls="owner-select ainp ";
    if(v==="reimb-davi"||v==="reimb-cleber") cls+="orig-reimb";
    else if(v==="infinitepay") cls+="orig-infinitepay";
    else if(v==="itau") cls+="orig-itau";
    else if(v==="dinheiro") cls+="orig-dinheiro";
    else cls+="owner-none";
    sel.className=cls; sel.style.width="auto"; sel.style.padding="8px 10px";
  });
})();

// ANUAL
function renderAnual() {
  let tE=0,tS=0,tI=0;
  const rows = MONTHS.map(m => {
    if (!data[m]) return null;
    const e=data[m].e.reduce((a,x)=>a+(+x.value||0),0);
    const s=data[m].s.reduce((a,x)=>x.reimb?a:a+(+x.value||0),0);
    const i=data[m].i.reduce((a,x)=>a+(+x.value||0),0);
    tE+=e;tS+=s;tI+=i;
    return {m,e,s,i,saldo:e-s};
  }).filter(Boolean);
  const tot=tE-tS;

      scheduleSave(); renderReimb();

}

// GROWTH
function renderGrowth() {
  if(!data._growth) data._growth={};
  const g=data._growth;
  const filled=MONTHS.filter(m=>g[m]!=null&&g[m]!=="");
  const avg=filled.length?filled.reduce((a,m)=>a+(+g[m]||0),0)/filled.length:null;
  const best=filled.length?filled.reduce((a,m)=>(+g[m]||0)>(+g[a]||0)?m:a,filled[0]):null;
  const worst=filled.length?filled.reduce((a,m)=>(+g[m]||0)<(+g[a]||0)?m:a,filled[0]):null;
  const cards=MONTHS.map(m=>{
    const val=g[m]!=null?g[m]:""; const pct=+val||0;
    const color=pct>0?"#16A34A":pct<0?"var(--danger)":"var(--n400)";
    const bw=Math.min(Math.abs(pct),100); const bc=pct>0?"#16A34A":pct<0?"var(--danger)":"var(--n200)";
    return "<div class=\"growth-card\"><div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap\">" +
      "<div style=\"font-size:14px;font-weight:500\">" + m + "</div>" +
      "<div style=\"display:flex;align-items:center;gap:8px\">" +
        "<input class=\"growth-input\" style=\"width:100px;text-align:right\" type=\"number\" id=\"g-" + m + "\" value=\"" + val + "\" placeholder=\"0\" step=\"0.1\">" +
        "<span style=\"font-size:14px;color:var(--n400)\">%</span>" +
        (val!==""?"<span style=\"font-size:16px;font-weight:600;color:" + color + "\">" + (pct>0?"+":"") + pct + "%</span>":"<span style=\"font-size:13px;color:var(--n400)\">\u2014</span>") +
      "</div></div>" +
      (val!==""?"<div class=\"growth-bar-wrap\"><div class=\"growth-bar\" style=\"width:" + bw + "%;background:" + bc + "\"></div></div>":"") +
    "</div>";
  }).join("");
  document.getElementById("main").innerHTML =
    "<div class=\"anim\"><div class=\"ptitle\" style=\"color:#0891B2\">&#128200; Crescimento <span>Anual</span></div><div class=\"phint\">Lance a porcentagem de crescimento de cada m\u00eas</div></div>" +
    "<div class=\"invest-summary anim a1\">" +
      "<div class=\"invest-owner-card ioc-cyan\"><div class=\"slabel\" style=\"color:#0E7490\">M\u00e9dia anual</div><div class=\"sval\" style=\"color:#0891B2;font-size:22px\">" + (avg!=null?(avg>0?"+":"")+avg.toFixed(1)+"%":"\u2014") + "</div></div>" +
      "<div class=\"invest-owner-card\" style=\"border-color:#BBF7D0\"><div class=\"sacc\" style=\"background:#16A34A;position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--rlg) var(--rlg) 0 0\"></div><div class=\"slabel\" style=\"color:#15803D\">Melhor m\u00eas</div><div class=\"sval\" style=\"color:#16A34A;font-size:18px\">" + (best?best+" (+"+g[best]+"%)":"\u2014") + "</div></div>" +
      "<div class=\"invest-owner-card\" style=\"border-color:#FECACA\"><div class=\"sacc\" style=\"background:var(--danger);position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--rlg) var(--rlg) 0 0\"></div><div class=\"slabel\" style=\"color:#B91C1C\">Pior m\u00eas</div><div class=\"sval\" style=\"color:var(--danger);font-size:18px\">" + (worst?worst+" ("+g[worst]+"%)":"\u2014") + "</div></div>" +
    "</div>" +
    "<div class=\"section anim a2\"><div class=\"sechdr\"><div class=\"sectitle\"><div class=\"secico\" style=\"background:#ECFEFF\">&#128200;</div>Lan\u00e7amento por m\u00eas</div><button class=\"growth-save-btn\" id=\"gsave\">Salvar</button></div><div style=\"padding:16px 20px\">" + cards + "</div></div>";
  document.getElementById("gsave").addEventListener("click",()=>{
    if(!data._growth) data._growth={};
    MONTHS.forEach(m=>{ const el=document.getElementById("g-"+m); if(el) data._growth[m]=parseFloat(el.value.replace(",","."))||null; });

  });

// VALORES
function getSaldoGeral() {
  let tE=0,tS=0;
  MONTHS.forEach(m=>{ if(!data[m])return; tE+=data[m].e.reduce((a,x)=>a+(+x.value||0),0); tS+=data[m].s.reduce((a,x)=>x.reimb?a:a+(+x.value||0),0); });
  return tE-tS;
}

function renderValores() {
  // Calcula saldo por conta a partir dos lançamentos
  const saldos = {infinitepay:0, itau:0, dinheiro:0};
  MONTHS.forEach(m=>{
    if(!data[m]) return;
    data[m].e.forEach(x=>{ if(x.conta && saldos[x.conta]!==undefined) saldos[x.conta]+=(+x.value||0); });
    data[m].s.forEach(x=>{ if(x.reimb) return; if(x.conta && saldos[x.conta]!==undefined) saldos[x.conta]-=(+x.value||0); });
  });
  const ip=saldos.infinitepay, it=saldos.itau, din=saldos.dinheiro;
  const geral=getSaldoGeral();
  const geralFmt=new Intl.NumberFormat("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}).format(geral);
  const fmtSaldo=v=>new Intl.NumberFormat("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}).format(v);
  const cardColor=v=>v>=0?"var(--g600)":"var(--danger)";
  document.getElementById("main").innerHTML =
    "<div class=\"anim\"><div class=\"ptitle\" style=\"color:var(--g600)\">&#127970; Valores</div><div class=\"phint\">Saldos calculados automaticamente a partir dos lan\u00e7amentos</div></div>" +
    "<div class=\"anim a1\">" +

      "<div class=\"val-card\"><div class=\"val-card-left\"><div class=\"val-card-icon\" style=\"background:#F0FDF4\">&#128181;</div><div><div class=\"val-card-name\">Dinheiro</div><div class=\"val-card-sub\">Movimenta\u00e7\u00f5es vinculadas</div></div></div><div style=\"display:flex;align-items:center;gap:8px\"><span style=\"font-size:13px;color:var(--n400)\">R$</span><span class=\"val-display\" style=\"color:"+cardColor(din)+";font-size:18px;font-weight:600\">"+fmtSaldo(din)+"</span></div></div>" +
